<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NuBrakes Local Search &amp; Reviews Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    html, body, #root { min-height: 100%; margin: 0; }
    body { font-family: "Barlow", "Segoe UI", sans-serif; }
    button, input, select { font: inherit; }
    .kpi-num {
      font-family: "Barlow Condensed", sans-serif;
      font-weight: 700;
      font-size: 36px;
      line-height: 1;
    }
    .loading-screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 30px;
      background: #f4f5f7;
      color: #1c2430;
    }
    .loading-card {
      max-width: 620px;
      padding: 24px;
      border: 1px solid #d7dce2;
      border-radius: 12px;
      background: #fff;
    }
  </style>
</head>
<body>
<div id="root">
  <div class="loading-screen">
    <div class="loading-card">Loading NuBrakes Local Search &amp; Reviews Dashboard…</div>
  </div>
</div>

<script type="text/babel">
if (!window.React || !window.ReactDOM || !window.Babel) {
  const missing = [
    !window.React && "React",
    !window.ReactDOM && "ReactDOM",
    !window.Babel && "Babel",
  ].filter(Boolean).join(", ");

  document.getElementById("root").innerHTML = `
    <div class="loading-screen">
      <div class="loading-card">
        <strong>Dashboard libraries failed to load.</strong><br><br>
        Missing: ${missing}. Check your internet connection, content blocker, or CDN access.
      </div>
    </div>`;
  throw new Error(`Missing browser libraries: ${missing}`);
}

const { useEffect, useMemo, useRef, useState } = React;

const RAW_DATA_URL =
  "https://nubrakes-analytics.github.io/NuBrakes-Copilot/data/fact_nubrakes_yext_performance_weekly.json";

const REVIEW_JOB_DATA_URL =
  "https://nubrakes-analytics.github.io/NuBrakes-Copilot/data/fact_nubrakes_reviews_job_daily.json";

const STORE_REVIEW_DATA_URL =
  "https://nubrakes-analytics.github.io/NuBrakes-Copilot/data/fact_nubrakes_store_reviews_daily.json";

const YEXT_COLS = {
  week: "Week",
  entity: "Entity ID",
  city: "City",
  address: "Address",
  keyword: "Keyword",
  pack: "Average First Local Pack Match Position",
  organic: "Average First Organic Match Position",
  searches: "Search Requests",
};

const THEMES = {
  dark: {
    bg: "#101418", panel: "#181e24", panelSoft: "#1e262e",
    line: "#2a343e", ink: "#e8edf1", dim: "#8fa0ad", faint: "#5b6b77",
    amber: "#f5b93f", teal: "#3fd0b6", red: "#e8604c",
    blue: "#7f9bff", purple: "#c98bf0", onAccent: "#14181c", btnText: "#1a1408",
  },
  light: {
    bg: "#f4f5f7", panel: "#ffffff", panelSoft: "#eef0f3",
    line: "#d7dce2", ink: "#1c2430", dim: "#5a6673", faint: "#8b96a2",
    amber: "#c98a00", teal: "#0f9c82", red: "#c94330",
    blue: "#3d63d6", purple: "#8a4fc9", onAccent: "#ffffff", btnText: "#ffffff",
  },
};

const metricMeta = (T) => ({
  pack: {
    label: "Local Pack",
    color: T.amber,
    domain: [0.5, 3.5],
    ticks: [1, 2, 3],
  },
  organic: {
    label: "Organic",
    color: T.blue,
    domain: [0, 10],
    ticks: [1, 3, 5, 7, 9],
  },
});

const kwColors = (T) => [T.teal, T.red, T.purple, T.amber, "#8fd45f"];

const marketColors = (T) => [
  T.teal, T.red, T.purple, T.amber, T.blue,
  "#70b8ff", "#7bc96f", "#f58aa8", "#9b8afb", "#e59d55", "#58b6a4",
];

const pick = (obj, aliases) => {
  for (const key of aliases) {
    if (obj?.[key] !== undefined && obj?.[key] !== null && obj?.[key] !== "") {
      return obj[key];
    }
  }
  return "";
};

const numberOrNaN = (value) => {
  if (typeof value === "number") return value;
  const parsed = parseFloat(String(value ?? "").replace(/,/g, "").trim());
  return Number.isFinite(parsed) ? parsed : NaN;
};

const integerOrZero = (value) => {
  const parsed = parseInt(String(value ?? "").replace(/,/g, "").trim(), 10);
  return Number.isFinite(parsed) ? parsed : 0;
};

const dateToDisplay = (value) => {
  if (!value) return "";
  const raw = String(value).trim();

  if (/^\d{2}\/\d{2}\/\d{4}$/.test(raw)) return raw;

  const isoDate = raw.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (isoDate) return `${isoDate[2]}/${isoDate[3]}/${isoDate[1]}`;

  const parsed = new Date(raw);
  if (!Number.isNaN(parsed.getTime())) {
    const mm = String(parsed.getUTCMonth() + 1).padStart(2, "0");
    const dd = String(parsed.getUTCDate()).padStart(2, "0");
    return `${mm}/${dd}/${parsed.getUTCFullYear()}`;
  }
  return raw;
};

const normalizeRow = (row) => {
  const addressRaw = pick(row, [
    "address", "street_address", "location_address", "Address", "Street Address",
  ]);

  return {
    week: dateToDisplay(pick(row, [
      "week", "week_date", "week_start", "week_start_date", "date", "interval",
      YEXT_COLS.week,
    ])),
    entity: String(pick(row, [
      "entity_id", "entityid", "entity", "location_id", "yext_entity_id",
      YEXT_COLS.entity,
    ])).trim(),
    city: String(pick(row, [
      "city", "location_city", YEXT_COLS.city,
    ])).trim(),
    address: String(addressRaw).split(",")[0].trim(),
    keyword: String(pick(row, [
      "keyword", "search_keyword", "query", YEXT_COLS.keyword,
    ])).trim(),
    pack: numberOrNaN(pick(row, [
      "average_first_local_pack_match_position",
      "avg_first_local_pack_match_position",
      "average_local_pack_position",
      "local_pack_position",
      "pack_position",
      "pack_pos",
      YEXT_COLS.pack,
    ])),
    organic: numberOrNaN(pick(row, [
      "average_first_organic_match_position",
      "avg_first_organic_match_position",
      "average_organic_position",
      "organic_position",
      "organic_pos",
      YEXT_COLS.organic,
    ])),
    searches: integerOrZero(pick(row, [
      "search_requests", "search_request_count", "searches", YEXT_COLS.searches,
    ])),
  };
};

const extractArray = (payload) => {
  if (Array.isArray(payload)) return payload;
  if (Array.isArray(payload?.data)) return payload.data;
  if (Array.isArray(payload?.rows)) return payload.rows;
  if (Array.isArray(payload?.results)) return payload.results;
  if (Array.isArray(payload?.records)) return payload.records;
  return [];
};

const normalizePayload = (payload) =>
  extractArray(payload)
    .map(normalizeRow)
    .filter((r) => r.week && r.entity && r.keyword && (!Number.isNaN(r.pack) || !Number.isNaN(r.organic)));

const isoDate = (value) => {
  const match = String(value || "").match(/^(\d{4}-\d{2}-\d{2})/);
  return match ? match[1] : "";
};

const monthStart = (value) => {
  const date = isoDate(value);
  return date ? `${date.slice(0, 7)}-01` : "";
};

const cleanMarket = (value) => {
  const market = String(value || "").trim();
  return !market || market === "#N/A" ? "Unassigned" : market;
};

const normalizeReviewJobRow = (row) => ({
  day: isoDate(pick(row, ["Day", "day", "Date", "date"])),
  week: isoDate(pick(row, ["Week", "week"])),
  month: isoDate(pick(row, ["Month", "month"])) || monthStart(pick(row, ["Day", "day"])),
  market: cleanMarket(pick(row, ["market", "Market"])),
  completedJobs: integerOrZero(pick(row, ["Completed Jobs", "completed_jobs", "jobs"])),
  reviews: integerOrZero(pick(row, ["Reviews", "reviews"])),
});

const normalizeStoreReviewRow = (row) => {
  const date = isoDate(pick(row, ["Date", "date", "Day", "day"]));
  const storeCode = String(pick(row, ["Store code", "store_code", "Store Code"])).trim();
  const locationId = String(pick(row, ["Location ID", "location_id"])).trim();

  return {
    date,
    week: isoDate(pick(row, ["Week", "week"])),
    month: monthStart(date),
    market: cleanMarket(pick(row, ["Market", "market"])),
    reviews: integerOrZero(pick(row, ["Reviews", "reviews"])),
    listing: storeCode || locationId,
    storeCode: storeCode || locationId || "Unknown listing",
    locationId,
    name: String(pick(row, ["Location name", "location_name"])).trim(),
    address: String(pick(row, ["Address lines", "address", "Address"])).trim(),
  };
};

const normalizeReviewJobPayload = (payload) =>
  extractArray(payload)
    .map(normalizeReviewJobRow)
    .filter((row) => row.day && row.week && row.month && row.market);

const normalizeStoreReviewPayload = (payload) =>
  extractArray(payload)
    .map(normalizeStoreReviewRow)
    .filter((row) => row.date && row.week && row.month && row.market && row.listing);

const shortPeriod = (value, granularity) => {
  const date = isoDate(value);
  if (!date) return String(value || "");
  const [year, month, day] = date.split("-");
  return granularity === "month" ? `${month}/${year.slice(2)}` : `${month}/${day}/${year.slice(2)}`;
};

const niceChartMax = (value) => {
  if (!Number.isFinite(value) || value <= 0) return 1;
  const power = 10 ** Math.floor(Math.log10(value));
  const fraction = value / power;
  const rounded = fraction <= 1 ? 1 : fraction <= 2 ? 2 : fraction <= 5 ? 5 : 10;
  return rounded * power;
};

const chartScale = (data, series) => {
  const peak = Math.max(0, ...data.flatMap((row) =>
    series.map((item) => Number.isFinite(row[item.key]) ? row[item.key] : 0)
  ));
  const max = niceChartMax(peak * 1.08);
  const ticks = Array.from({ length: 5 }, (_, index) => +(max * index / 4).toFixed(2));
  return { domain: [0, max], ticks };
};

const sortKey = (week) => {
  const parts = String(week).split("/").map(Number);
  if (parts.length === 3 && parts.every(Number.isFinite)) {
    const [m, d, y] = parts;
    return y * 10000 + m * 100 + d;
  }
  return 0;
};

function summarize(values) {
  if (!values.length) return null;
  const valid = values.filter(Number.isFinite);
  if (!valid.length) return null;

  const ranked = valid.filter((v) => v > 0);
  const avg = (arr) => arr.reduce((sum, value) => sum + value, 0) / arr.length;

  return {
    avgRanked: ranked.length ? +avg(ranked).toFixed(2) : null,
    avgAll: +avg(valid).toFixed(2),
    matchRate: +((ranked.length / valid.length) * 100).toFixed(1),
    n: valid.length,
  };
}

function weeklySummary(rows, metric, keyword, entity) {
  const filtered = rows.filter((row) =>
    (keyword === "all" || row.keyword === keyword) &&
    (entity === "all" || row.entity === entity) &&
    Number.isFinite(row[metric])
  );

  const byWeek = {};
  filtered.forEach((row) => {
    (byWeek[row.week] ||= []).push(row);
  });

  return Object.entries(byWeek)
    .map(([week, weekRows]) => ({
      week,
      ...summarize(weekRows.map((row) => row[metric])),
      searches: weekRows.reduce((sum, row) => sum + (row.searches || 0), 0),
      partial: weekRows.length < (entity === "all" ? 20 : 1),
    }))
    .sort((a, b) => sortKey(a.week) - sortKey(b.week));
}


function SvgLineChart({
  data,
  series,
  domain = [0, 100],
  ticks = [],
  reversed = false,
  percent = false,
  rolloutWeek = "",
  T,
  height = 260,
}) {
  const width = 900;
  const margin = { top: 30, right: 24, bottom: 46, left: 58 };
  const plotW = width - margin.left - margin.right;
  const plotH = height - margin.top - margin.bottom;
  const [minY, maxY] = domain;
  const x = (i) => margin.left + (data.length <= 1 ? plotW / 2 : (i / (data.length - 1)) * plotW);
  const y = (value) => {
    const pct = (value - minY) / Math.max(0.0001, maxY - minY);
    return reversed
      ? margin.top + pct * plotH
      : margin.top + (1 - pct) * plotH;
  };

  const makePath = (key) => {
    let d = "";
    let started = false;
    data.forEach((row, i) => {
      const v = row[key];
      if (!Number.isFinite(v)) {
        started = false;
        return;
      }
      d += `${started ? " L" : "M"} ${x(i).toFixed(2)} ${y(v).toFixed(2)}`;
      started = true;
    });
    return d;
  };

  const rolloutIndex = rolloutWeek
    ? data.findIndex((row) => row.fullWeek === rolloutWeek)
    : -1;

  const xTickStep = Math.max(1, Math.ceil(data.length / 8));

  return (
    <div style={{ width: "100%", overflowX: "auto" }}>
      <svg viewBox={`0 0 ${width} ${height}`} role="img" style={{ width: "100%", minWidth: 620, display: "block" }}>
        {ticks.map((tick) => (
          <g key={tick}>
            <line x1={margin.left} x2={width - margin.right} y1={y(tick)} y2={y(tick)} stroke={T.line} strokeDasharray="3 6" />
            <text x={margin.left - 10} y={y(tick) + 4} textAnchor="end" fontSize="11" fill={T.dim}>
              {tick}{percent ? "%" : ""}
            </text>
          </g>
        ))}

        <line x1={margin.left} x2={margin.left} y1={margin.top} y2={height - margin.bottom} stroke={T.faint} />
        <line x1={margin.left} x2={width - margin.right} y1={height - margin.bottom} y2={height - margin.bottom} stroke={T.faint} />

        {data.map((row, i) => i % xTickStep === 0 || i === data.length - 1 ? (
          <text key={`${row.week}-${i}`} x={x(i)} y={height - 18} textAnchor="middle" fontSize="11" fill={T.dim}>
            {row.week}
          </text>
        ) : null)}

        {rolloutIndex >= 0 && (
          <g>
            <line x1={x(rolloutIndex)} x2={x(rolloutIndex)} y1={margin.top} y2={height - margin.bottom} stroke={T.teal} strokeDasharray="4 4" />
            <text x={x(rolloutIndex) + 5} y={18} fontSize="11" fill={T.teal}>listing changes</text>
          </g>
        )}

        {series.map((item) => (
          <g key={item.key}>
            <path d={makePath(item.key)} fill="none" stroke={item.color} strokeWidth={item.width || 2.5} strokeDasharray={item.dashed ? "6 4" : undefined} />
            {data.map((row, i) => {
              const v = row[item.key];
              if (!Number.isFinite(v)) return null;
              return (
                <circle key={`${item.key}-${i}`} cx={x(i)} cy={y(v)} r={item.radius || 3.5} fill={item.color} stroke={T.bg} strokeWidth="1.5">
                  <title>{`${row.fullWeek || row.week} · ${item.label}: ${v}${percent ? "%" : ""}`}</title>
                </circle>
              );
            })}
          </g>
        ))}
      </svg>
      <div style={{ display: "flex", gap: 14, flexWrap: "wrap", padding: "0 18px 8px 58px", fontSize: 11, color: T.dim }}>
        {series.map((item) => (
          <span key={item.key} style={{ display: "inline-flex", gap: 6, alignItems: "center" }}>
            <span style={{ width: 18, borderTop: `${item.width || 2}px ${item.dashed ? "dashed" : "solid"} ${item.color}` }} />
            {item.label}
          </span>
        ))}
      </div>
    </div>
  );
}

function SvgBarChart({ data, dataKey, domain = [0, 100], ticks = [0, 25, 50, 75, 100], color, percent = false, T, height = 220 }) {
  const width = 900;
  const margin = { top: 22, right: 24, bottom: 46, left: 58 };
  const plotW = width - margin.left - margin.right;
  const plotH = height - margin.top - margin.bottom;
  const [minY, maxY] = domain;
  const y = (value) => margin.top + (1 - (value - minY) / Math.max(0.0001, maxY - minY)) * plotH;
  const band = data.length ? plotW / data.length : plotW;
  const barW = Math.min(48, Math.max(8, band * 0.55));
  const xTickStep = Math.max(1, Math.ceil(data.length / 8));

  return (
    <div style={{ width: "100%", overflowX: "auto" }}>
      <svg viewBox={`0 0 ${width} ${height}`} role="img" style={{ width: "100%", minWidth: 620, display: "block" }}>
        {ticks.map((tick) => (
          <g key={tick}>
            <line x1={margin.left} x2={width - margin.right} y1={y(tick)} y2={y(tick)} stroke={T.line} strokeDasharray="3 6" />
            <text x={margin.left - 10} y={y(tick) + 4} textAnchor="end" fontSize="11" fill={T.dim}>{tick}{percent ? "%" : ""}</text>
          </g>
        ))}
        <line x1={margin.left} x2={width - margin.right} y1={height - margin.bottom} y2={height - margin.bottom} stroke={T.faint} />
        {data.map((row, i) => {
          const v = Number.isFinite(row[dataKey]) ? row[dataKey] : 0;
          const bx = margin.left + i * band + (band - barW) / 2;
          const by = y(v);
          return (
            <g key={`${row.week}-${i}`}>
              <rect x={bx} y={by} width={barW} height={Math.max(0, height - margin.bottom - by)} rx="4" fill={color}>
                <title>{`${row.fullWeek || row.week}: ${v}${percent ? "%" : ""}`}</title>
              </rect>
              {(i % xTickStep === 0 || i === data.length - 1) && (
                <text x={bx + barW / 2} y={height - 18} textAnchor="middle" fontSize="11" fill={T.dim}>{row.week}</text>
              )}
            </g>
          );
        })}
      </svg>
    </div>
  );
}

function KeywordTrends({ rows, mode, keywords, entity, rolloutWeek, card, T }) {
  const colors = kwColors(T);
  const allWeeks = [...new Set(rows.map((row) => row.week))].sort((a, b) => sortKey(a) - sortKey(b));
  const series = {};
  keywords.forEach((keyword) => {
    series[keyword] = {
      pack: weeklySummary(rows, "pack", keyword, entity),
      organic: weeklySummary(rows, "organic", keyword, entity),
    };
  });

  const positionData = allWeeks.map((week) => {
    const item = { week: week.slice(0, 5), fullWeek: week };
    keywords.forEach((keyword) => {
      const pack = series[keyword].pack.find((x) => x.week === week);
      const organic = series[keyword].organic.find((x) => x.week === week);
      item[`${keyword} · pack`] = pack ? (mode === "avgRanked" ? pack.avgRanked : pack.avgAll) : null;
      item[`${keyword} · organic`] = organic ? (mode === "avgRanked" ? organic.avgRanked : organic.avgAll) : null;
    });
    return item;
  });

  const rateData = allWeeks.map((week) => {
    const item = { week: week.slice(0, 5), fullWeek: week };
    keywords.forEach((keyword) => {
      const pack = series[keyword].pack.find((x) => x.week === week);
      const organic = series[keyword].organic.find((x) => x.week === week);
      item[`${keyword} · pack`] = pack?.matchRate ?? null;
      item[`${keyword} · organic`] = organic?.matchRate ?? null;
    });
    return item;
  });

  const chartSeries = keywords.flatMap((keyword, index) => [
    { key: `${keyword} · pack`, label: `${keyword} · pack`, color: colors[index % colors.length], width: 2.5 },
    { key: `${keyword} · organic`, label: `${keyword} · organic`, color: colors[index % colors.length], dashed: true, width: 2 },
  ]);

  const heading = (text) => (
    <div style={{ paddingLeft: 20, fontFamily: "'Barlow Condensed'", fontWeight: 600, fontSize: 17, textTransform: "uppercase", letterSpacing: 0.8, color: T.dim }}>{text}</div>
  );

  if (!keywords.length) return null;

  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(320px, 1fr))", gap: 12, marginTop: 12 }}>
      <div style={{ ...card, padding: "18px 8px 8px 0" }}>
        {heading("Position trend by keyword (solid = pack, dashed = organic)")}
        <SvgLineChart data={positionData} series={chartSeries} domain={[0, 10]} ticks={[1, 3, 5, 7, 9]} reversed rolloutWeek={rolloutWeek} T={T} />
      </div>
      <div style={{ ...card, padding: "18px 8px 8px 0" }}>
        {heading("Match rate trend by keyword (solid = pack, dashed = organic)")}
        <SvgLineChart data={rateData} series={chartSeries} domain={[0, 100]} ticks={[0, 25, 50, 75, 100]} percent rolloutWeek={rolloutWeek} T={T} />
      </div>
    </div>
  );
}

function TrendPanel({ rows, metric, mode, keyword, keywords, entity, rolloutWeek, card, T }) {
  const meta = metricMeta(T)[metric];
  const colors = kwColors(T);
  const main = weeklySummary(rows, metric, keyword, entity);
  const perKeyword = {};
  keywords.forEach((item) => { perKeyword[item] = weeklySummary(rows, metric, item, entity); });
  const allWeeks = [...new Set(rows.map((row) => row.week))].sort((a, b) => sortKey(a) - sortKey(b));

  const chartData = allWeeks.map((week) => {
    const mainWeek = main.find((item) => item.week === week);
    const item = {
      week: week.slice(0, 5),
      fullWeek: week,
      position: mainWeek ? (mode === "avgRanked" ? mainWeek.avgRanked : mainWeek.avgAll) : null,
      matchRate: mainWeek?.matchRate ?? null,
      n: mainWeek?.n ?? 0,
    };
    keywords.forEach((keywordItem) => {
      const keywordWeek = perKeyword[keywordItem].find((x) => x.week === week);
      item[keywordItem] = keywordWeek ? (mode === "avgRanked" ? keywordWeek.avgRanked : keywordWeek.avgAll) : null;
    });
    return item;
  });

  const keywordLabel = keyword === "all" ? "all keywords" : `"${keyword}"`;
  const heading = (text) => (
    <div style={{ paddingLeft: 20, fontFamily: "'Barlow Condensed'", fontWeight: 600, fontSize: 17, textTransform: "uppercase", letterSpacing: 0.8, color: T.dim }}>{text}</div>
  );

  return (
    <>
      <div style={{ ...card, padding: "18px 8px 8px 0", marginTop: 12 }}>
        {heading(`${meta.label} — weekly average position (${keywordLabel})`)}
        <SvgLineChart
          data={chartData}
          series={[{ key: "position", label: "avg position", color: meta.color, width: 3, radius: 4.5 }]}
          domain={meta.domain}
          ticks={meta.ticks}
          reversed
          rolloutWeek={rolloutWeek}
          T={T}
          height={280}
        />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(320px, 1fr))", gap: 12, marginTop: 12 }}>
        {keyword === "all" && (
          <div style={{ ...card, padding: "18px 8px 8px 0" }}>
            {heading("Keyword comparison")}
            <SvgLineChart
              data={chartData}
              series={keywords.map((keywordItem, index) => ({ key: keywordItem, label: keywordItem, color: colors[index % colors.length], width: 2 }))}
              domain={meta.domain}
              ticks={meta.ticks}
              reversed
              T={T}
              height={220}
            />
          </div>
        )}

        <div style={{ ...card, padding: "18px 8px 8px 0" }}>
          {heading(`Match rate — ${keywordLabel}`)}
          <SvgBarChart data={chartData} dataKey="matchRate" domain={[0, 100]} color={meta.color} percent T={T} height={220} />
        </div>
      </div>
    </>
  );
}

function ReviewDashboard({
  jobRows,
  storeRows,
  sourceStatus,
  sourceMessage,
  card,
  T,
  selectStyle,
}) {
  const [granularity, setGranularity] = useState("week");
  const [selectedMarket, setSelectedMarket] = useState("all");
  const [selectedListing, setSelectedListing] = useState("all");
  const colors = marketColors(T);

  const markets = useMemo(() => [...new Set([
    ...jobRows.map((row) => row.market),
    ...storeRows.map((row) => row.market),
  ].filter(Boolean))].sort(), [jobRows, storeRows]);

  const jobMarkets = useMemo(() =>
    [...new Set(jobRows.map((row) => row.market).filter(Boolean))].sort(),
    [jobRows]
  );

  const storeMarkets = useMemo(() =>
    [...new Set(storeRows.map((row) => row.market).filter(Boolean))].sort(),
    [storeRows]
  );

  useEffect(() => {
    setSelectedListing("all");
  }, [selectedMarket]);

  const jobChartData = useMemo(() => {
    const buckets = {};

    jobRows.forEach((row) => {
      const period = row[granularity];
      if (!period) return;
      const bucket = buckets[period] ||= { reviews: 0, jobs: 0, markets: {} };
      bucket.reviews += row.reviews;
      bucket.jobs += row.completedJobs;
      const market = bucket.markets[row.market] ||= { reviews: 0, jobs: 0 };
      market.reviews += row.reviews;
      market.jobs += row.completedJobs;
    });

    return Object.entries(buckets)
      .sort(([a], [b]) => a.localeCompare(b))
      .map(([period, bucket]) => {
        const item = {
          week: shortPeriod(period, granularity),
          fullWeek: period,
          Total: bucket.jobs ? +((bucket.reviews / bucket.jobs) * 100).toFixed(2) : null,
        };
        markets.forEach((market) => {
          const marketBucket = bucket.markets[market];
          item[market] = marketBucket?.jobs
            ? +((marketBucket.reviews / marketBucket.jobs) * 100).toFixed(2)
            : null;
        });
        return item;
      });
  }, [jobRows, granularity, markets]);

  const reviewChartData = useMemo(() => {
    const buckets = {};

    storeRows.forEach((row) => {
      const period = row[granularity];
      if (!period) return;
      const bucket = buckets[period] ||= { total: 0, markets: {} };
      bucket.total += row.reviews;
      bucket.markets[row.market] = (bucket.markets[row.market] || 0) + row.reviews;
    });

    return Object.entries(buckets)
      .sort(([a], [b]) => a.localeCompare(b))
      .map(([period, bucket]) => {
        const item = {
          week: shortPeriod(period, granularity),
          fullWeek: period,
          Total: bucket.total,
        };
        markets.forEach((market) => { item[market] = bucket.markets[market] || 0; });
        return item;
      });
  }, [storeRows, granularity, markets]);

  const listings = useMemo(() => {
    const byListing = {};
    storeRows
      .filter((row) => selectedMarket === "all" || row.market === selectedMarket)
      .forEach((row) => {
        const item = byListing[row.listing] ||= {
          id: row.listing,
          storeCode: row.storeCode,
          address: row.address,
          market: row.market,
          reviews: 0,
        };
        item.reviews += row.reviews;
      });

    return Object.values(byListing).sort((a, b) =>
      b.reviews - a.reviews || a.storeCode.localeCompare(b.storeCode)
    );
  }, [storeRows, selectedMarket]);

  const plottedListings = selectedListing === "all"
    ? listings.slice(0, 8)
    : listings.filter((item) => item.id === selectedListing);

  const listingSeries = plottedListings.map((item, index) => ({
    key: `listing:${item.id}`,
    label: `${item.storeCode} · ${item.market}`,
    color: colors[index % colors.length],
    width: 2.5,
    radius: 3,
  }));

  const listingChartData = useMemo(() => {
    const scoped = storeRows.filter((row) =>
      (selectedMarket === "all" || row.market === selectedMarket) &&
      plottedListings.some((item) => item.id === row.listing)
    );
    const buckets = {};

    scoped.forEach((row) => {
      const period = row[granularity];
      if (!period) return;
      const bucket = buckets[period] ||= {};
      bucket[row.listing] = (bucket[row.listing] || 0) + row.reviews;
    });

    return Object.entries(buckets)
      .sort(([a], [b]) => a.localeCompare(b))
      .map(([period, bucket]) => {
        const item = { week: shortPeriod(period, granularity), fullWeek: period };
        plottedListings.forEach((listing) => {
          item[`listing:${listing.id}`] = bucket[listing.id] || 0;
        });
        return item;
      });
  }, [storeRows, granularity, selectedMarket, selectedListing, listings]);

  const makeMarketSeries = (availableMarkets) => [
    { key: "Total", label: "Total", color: T.ink, width: 3.5, radius: 4 },
    ...(selectedMarket === "all"
      ? availableMarkets
      : availableMarkets.includes(selectedMarket) ? [selectedMarket] : []
    ).map((market, index) => ({
      key: market,
      label: market,
      color: colors[index % colors.length],
      width: 2,
      radius: 2.75,
    })),
  ];

  const jobMarketSeries = makeMarketSeries(jobMarkets);
  const reviewMarketSeries = makeMarketSeries(storeMarkets);
  const rateScale = chartScale(jobChartData, jobMarketSeries);
  const reviewScale = chartScale(reviewChartData, reviewMarketSeries);
  const listingScale = chartScale(listingChartData, listingSeries);
  const latestRate = jobChartData[jobChartData.length - 1];
  const latestReviews = reviewChartData[reviewChartData.length - 1];
  const periodLabel = granularity === "week" ? "week" : "month";

  const heading = (title, detail) => (
    <div style={{ padding: "0 18px 8px 20px" }}>
      <div style={{
        fontFamily: "'Barlow Condensed'",
        fontWeight: 600,
        fontSize: 18,
        textTransform: "uppercase",
        letterSpacing: 0.8,
        color: T.ink,
      }}>
        {title}
      </div>
      <div style={{ color: T.faint, fontSize: 12, marginTop: 3 }}>{detail}</div>
    </div>
  );

  const miniKpi = (label, value, detail, color) => (
    <div style={card}>
      <div style={{ color: T.dim, fontSize: 11, textTransform: "uppercase", letterSpacing: 1 }}>{label}</div>
      <div className="kpi-num" style={{ color, marginTop: 7 }}>{value}</div>
      <div style={{ color: T.faint, fontSize: 12, marginTop: 5 }}>{detail}</div>
    </div>
  );

  if (sourceStatus === "error" && !jobRows.length && !storeRows.length) {
    return (
      <div style={{ ...card, marginTop: 14, color: T.red, lineHeight: 1.6 }}>
        {sourceMessage}
      </div>
    );
  }

  return (
    <div>
      <div style={{
        ...card,
        marginTop: 14,
        display: "flex",
        alignItems: "center",
        justifyContent: "space-between",
        gap: 14,
        flexWrap: "wrap",
      }}>
        <div>
          <div style={{ fontWeight: 600, fontSize: 15 }}>Review reporting</div>
          <div style={{ color: T.faint, fontSize: 12, marginTop: 3 }}>
            Compare total performance with every market, then drill into individual listings.
          </div>
        </div>

        <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
          <div style={{ display: "flex", background: T.panelSoft, border: `1px solid ${T.line}`, borderRadius: 8, overflow: "hidden" }}>
            {["week", "month"].map((item) => (
              <button
                key={item}
                onClick={() => setGranularity(item)}
                aria-pressed={granularity === item}
                style={{
                  background: granularity === item ? T.teal : "transparent",
                  color: granularity === item ? T.onAccent : T.dim,
                  border: "none",
                  padding: "7px 16px",
                  fontWeight: 600,
                  fontSize: 13,
                  cursor: "pointer",
                }}
              >
                {item === "week" ? "Weekly" : "Monthly"}
              </button>
            ))}
          </div>

          <label style={{ color: T.dim, fontSize: 13 }}>
            Market focus
            <select
              value={selectedMarket}
              onChange={(event) => setSelectedMarket(event.target.value)}
              style={selectStyle}
            >
              <option value="all">Total + all markets</option>
              {markets.map((market) => <option key={market} value={market}>{market}</option>)}
            </select>
          </label>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 12, marginTop: 12 }}>
        {miniKpi(
          `Latest ${periodLabel} review rate`,
          Number.isFinite(latestRate?.Total) ? `${latestRate.Total}%` : "—",
          `${latestRate?.week || "—"} · reviews per 100 completed jobs`,
          T.teal
        )}
        {miniKpi(
          `Latest ${periodLabel} reviews`,
          Number.isFinite(latestReviews?.Total) ? latestReviews.Total.toLocaleString() : "—",
          `${latestReviews?.week || "—"} · store review source`,
          T.amber
        )}
        {miniKpi(
          "Listings in scope",
          listings.length.toLocaleString(),
          selectedMarket === "all" ? "all markets" : selectedMarket,
          T.blue
        )}
      </div>

      <div style={{ ...card, padding: "18px 8px 8px 0", marginTop: 12 }}>
        {heading(
          `Reviews per completed job · by ${periodLabel}`,
          "Percentage of completed jobs that generated a review. The bold line is the company total."
        )}
        <SvgLineChart
          data={jobChartData}
          series={jobMarketSeries}
          domain={rateScale.domain}
          ticks={rateScale.ticks}
          percent
          T={T}
          height={310}
        />
      </div>

      <div style={{ ...card, padding: "18px 8px 8px 0", marginTop: 12 }}>
        {heading(
          `Reviews per ${periodLabel} · total and by market`,
          "Store-review volume, with the company total shown against each market."
        )}
        <SvgLineChart
          data={reviewChartData}
          series={reviewMarketSeries}
          domain={reviewScale.domain}
          ticks={reviewScale.ticks}
          T={T}
          height={310}
        />
      </div>

      <div style={{ ...card, padding: "18px 8px 8px 0", marginTop: 12 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12, flexWrap: "wrap", paddingRight: 18 }}>
          {heading(
            `Reviews per ${periodLabel} · per listing`,
            selectedListing === "all"
              ? "Top 8 listings by review volume in the selected market scope."
              : "Showing one listing across the full available timeline."
          )}
          <label style={{ color: T.dim, fontSize: 13 }}>
            Listing
            <select
              value={selectedListing}
              onChange={(event) => setSelectedListing(event.target.value)}
              style={{ ...selectStyle, maxWidth: 430 }}
            >
              <option value="all">Top 8 listings</option>
              {listings.map((item) => (
                <option key={item.id} value={item.id}>
                  {item.storeCode} · {item.market} · {item.address || "No address"}
                </option>
              ))}
            </select>
          </label>
        </div>

        {listingSeries.length ? (
          <SvgLineChart
            data={listingChartData}
            series={listingSeries}
            domain={listingScale.domain}
            ticks={listingScale.ticks}
            T={T}
            height={320}
          />
        ) : (
          <div style={{ color: T.faint, padding: "24px 20px" }}>No listing review rows are available for this selection.</div>
        )}
      </div>

      <div style={{ color: T.faint, fontSize: 12, marginTop: 14, lineHeight: 1.6 }}>
        Review rate uses the reviews and completed jobs in the job-level daily source. Review volume and listing trends use the store-review daily source. Monthly values are summed into calendar months; weekly values use each source’s supplied week.
      </div>
    </div>
  );
}

function RankTracker() {
  const [themeName, setThemeName] = useState("light");
  const T = THEMES[themeName];
  const MM = metricMeta(T);

  const [rows, setRows] = useState([]);
  const [sourceStatus, setSourceStatus] = useState("loading");
  const [sourceMessage, setSourceMessage] = useState("Loading the hosted weekly JSON…");
  const [reviewJobRows, setReviewJobRows] = useState([]);
  const [storeReviewRows, setStoreReviewRows] = useState([]);
  const [reviewSourceStatus, setReviewSourceStatus] = useState("loading");
  const [reviewSourceMessage, setReviewSourceMessage] = useState("Loading the hosted review JSON…");
  const [sectionTab, setSectionTab] = useState("rankings");
  const [rolloutWeek, setRolloutWeek] = useState("");
  const [mode, setMode] = useState("avgRanked");
  const [tab, setTab] = useState("pack");
  const [keyword, setKeyword] = useState("all");
  const [entity, setEntity] = useState("all");
  const [entityQuery, setEntityQuery] = useState("");
  const [note, setNote] = useState("");
  const [sortBy, setSortBy] = useState("pack");
  const [sortDir, setSortDir] = useState("asc");
  const [sumWeek, setSumWeek] = useState("all");
  const fileRef = useRef(null);

  const loadHostedData = async () => {
    setSourceStatus("loading");
    setSourceMessage("Loading the hosted weekly JSON…");
    setNote("");

    try {
      const response = await fetch(`${RAW_DATA_URL}?v=${Date.now()}`, {
        cache: "no-store",
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      const rawText = await response.text();

      if (!rawText.trim()) {
        throw new Error("The hosted JSON file is empty (0 data rows).");
      }

      let payload;
      try {
        payload = JSON.parse(rawText);
      } catch (parseError) {
        throw new Error(`The hosted file is not valid JSON: ${parseError.message}`);
      }

      const extracted = extractArray(payload);
      const normalized = normalizePayload(payload);

      if (!extracted.length) {
        throw new Error("The hosted JSON is valid but contains no records.");
      }

      if (!normalized.length) {
        const firstKeys = Object.keys(extracted[0] || {}).slice(0, 12).join(", ");
        throw new Error(
          `The JSON contains ${extracted.length.toLocaleString()} record(s), but none match the expected Yext fields. ` +
          `First record keys: ${firstKeys || "none"}`
        );
      }

      setRows(normalized);
      setSourceStatus("loaded");
      setSourceMessage(
        `Live JSON loaded · ${normalized.length.toLocaleString()} rows · ` +
        `${new Set(normalized.map((row) => row.week)).size} weeks`
      );
    } catch (error) {
      console.error(error);
      setRows([]);
      setSourceStatus("error");
      setSourceMessage(
        `Could not load the hosted JSON: ${error.message}. ` +
        `Open this dashboard through a web server or GitHub Pages, then verify CORS and the field names.`
      );
    }
  };

  const loadReviewData = async () => {
    setReviewSourceStatus("loading");
    setReviewSourceMessage("Loading the hosted review JSON…");

    try {
      const cacheBuster = Date.now();
      const [jobResponse, storeResponse] = await Promise.all([
        fetch(`${REVIEW_JOB_DATA_URL}?v=${cacheBuster}`, { cache: "no-store" }),
        fetch(`${STORE_REVIEW_DATA_URL}?v=${cacheBuster}`, { cache: "no-store" }),
      ]);

      if (!jobResponse.ok || !storeResponse.ok) {
        throw new Error(
          `Review source request failed (${jobResponse.status}/${storeResponse.status}).`
        );
      }

      const [jobPayload, storePayload] = await Promise.all([
        jobResponse.json(),
        storeResponse.json(),
      ]);
      const normalizedJobs = normalizeReviewJobPayload(jobPayload);
      const normalizedStores = normalizeStoreReviewPayload(storePayload);

      if (!normalizedJobs.length || !normalizedStores.length) {
        throw new Error(
          `Expected review fields were not found (${normalizedJobs.length} job rows, ${normalizedStores.length} store rows).`
        );
      }

      setReviewJobRows(normalizedJobs);
      setStoreReviewRows(normalizedStores);
      setReviewSourceStatus("loaded");
      setReviewSourceMessage(
        `Live review JSON loaded · ${normalizedJobs.length.toLocaleString()} job rows · ` +
        `${normalizedStores.length.toLocaleString()} store rows · ` +
        `${new Set(normalizedStores.map((row) => row.listing)).size.toLocaleString()} listings`
      );
    } catch (error) {
      console.error(error);
      setReviewJobRows([]);
      setStoreReviewRows([]);
      setReviewSourceStatus("error");
      setReviewSourceMessage(
        `Could not load the hosted review JSON: ${error.message} ` +
        `Open this dashboard through a web server or GitHub Pages, then verify CORS and the field names.`
      );
    }
  };

  useEffect(() => {
    loadHostedData();
    loadReviewData();
  }, []);

  const keywords = useMemo(
    () => [...new Set(rows.map((row) => row.keyword).filter(Boolean))].sort(),
    [rows]
  );

  const entities = useMemo(() => {
    const map = {};
    rows.forEach((row) => {
      if (row.entity && !map[row.entity]) {
        map[row.entity] = {
          id: row.entity,
          city: row.city,
          address: row.address,
        };
      }
    });

    return Object.values(map).sort((a, b) =>
      `${a.city}${a.id}`.localeCompare(`${b.city}${b.id}`)
    );
  }, [rows]);

  const weeksList = useMemo(
    () => [...new Set(rows.map((row) => row.week))]
      .sort((a, b) => sortKey(a) - sortKey(b)),
    [rows]
  );

  const filteredEntities = useMemo(() => {
    const query = entityQuery.trim().toLowerCase();
    if (!query) return entities;

    return entities.filter((item) =>
      item.id.toLowerCase().includes(query) ||
      item.city.toLowerCase().includes(query) ||
      item.address.toLowerCase().includes(query)
    );
  }, [entities, entityQuery]);

  const handleUpload = (event) => {
    const file = event.target.files?.[0];
    if (!file) return;

    setNote("");

    Papa.parse(file, {
      header: true,
      skipEmptyLines: true,
      complete: (result) => {
        const parsed = result.data
          .map(normalizeRow)
          .filter((row) =>
            row.week &&
            row.entity &&
            row.keyword &&
            (!Number.isNaN(row.pack) || !Number.isNaN(row.organic))
          );

        if (!parsed.length) {
          setNote("No usable Yext rows were found in that CSV.");
          return;
        }

        const newWeeks = new Set(parsed.map((row) => row.week));
        setRows((previous) => [
          ...previous.filter((row) => !newWeeks.has(row.week)),
          ...parsed,
        ]);

        setNote(
          `Added ${parsed.length.toLocaleString()} rows across ` +
          `${newWeeks.size} week${newWeeks.size === 1 ? "" : "s"} from ${file.name}.`
        );
      },
      error: () => setNote("The CSV could not be read."),
    });

    event.target.value = "";
  };

  const entitySummary = useMemo(() => {
    const base = rows.filter((row) =>
      (keyword === "all" || row.keyword === keyword) &&
      (sumWeek === "all" || row.week === sumWeek)
    );

    const byEntity = {};
    base.forEach((row) => {
      (byEntity[row.entity] ||= []).push(row);
    });

    const list = Object.entries(byEntity).map(([id, entityRows]) => {
      const info = entityRows[0];
      const pack = summarize(
        entityRows.map((row) => row.pack).filter(Number.isFinite)
      );
      const organic = summarize(
        entityRows.map((row) => row.organic).filter(Number.isFinite)
      );

      return {
        id,
        city: info.city,
        address: info.address,
        n: entityRows.length,
        searches: entityRows.reduce((sum, row) => sum + (row.searches || 0), 0),
        packPos: pack?.avgRanked ?? null,
        packRate: pack?.matchRate ?? null,
        orgPos: organic?.avgRanked ?? null,
        orgRate: organic?.matchRate ?? null,
      };
    });

    const key = {
      pack: "packPos",
      packRate: "packRate",
      organic: "orgPos",
      orgRate: "orgRate",
      city: "city",
      searches: "searches",
    }[sortBy] || "packPos";

    const direction = sortDir === "asc" ? 1 : -1;

    return list.sort((a, b) => {
      const av = a[key];
      const bv = b[key];

      if (av == null && bv == null) return 0;
      if (av == null) return 1;
      if (bv == null) return -1;

      if (typeof av === "string") return av.localeCompare(bv) * direction;
      return (av - bv) * direction;
    });
  }, [rows, keyword, sumWeek, sortBy, sortDir]);

  const toggleSort = (column) => {
    if (sortBy === column) {
      setSortDir(sortDir === "asc" ? "desc" : "asc");
    } else {
      setSortBy(column);
      setSortDir("asc");
    }
  };

  const arrow = (column) =>
    sortBy === column ? (sortDir === "asc" ? " ▲" : " ▼") : "";

  const packSummary = weeklySummary(rows, "pack", keyword, entity);
  const organicSummary = weeklySummary(rows, "organic", keyword, entity);

  const deltaFor = (summary) => {
    const fullWeeks = summary.filter((week) => !week.partial && week.avgRanked != null);
    return fullWeeks.length >= 2
      ? fullWeeks[fullWeeks.length - 1].avgRanked - fullWeeks[0].avgRanked
      : null;
  };

  const latestPack = packSummary[packSummary.length - 1];
  const latestOrganic = organicSummary[organicSummary.length - 1];
  const packDelta = deltaFor(packSummary);
  const organicDelta = deltaFor(organicSummary);

  const card = {
    background: T.panel,
    border: `1px solid ${T.line}`,
    borderRadius: 10,
    padding: "16px 18px",
  };

  const kpi = (label, value, subtext, color = T.ink) => (
    <div style={card}>
      <div style={{
        color: T.dim,
        fontSize: 12,
        textTransform: "uppercase",
        letterSpacing: 1,
      }}>
        {label}
      </div>
      <div className="kpi-num" style={{ color, marginTop: 6 }}>
        {value ?? "—"}
      </div>
      <div style={{ color: T.faint, fontSize: 12, marginTop: 4 }}>
        {subtext}
      </div>
    </div>
  );

  const deltaColor = (delta) =>
    delta == null ? T.faint : delta < 0 ? T.teal : delta > 0 ? T.red : T.ink;

  const deltaText = (delta) =>
    delta == null ? "—" : `${delta > 0 ? "+" : ""}${delta.toFixed(2)}`;

  const selectedEntity =
    entity === "all" ? null : entities.find((item) => item.id === entity);

  const scopeLabel =
    (keyword === "all" ? "All keywords" : keyword) +
    (selectedEntity ? ` · ${selectedEntity.city}` : "");

  const selectStyle = {
    background: T.panelSoft,
    color: T.ink,
    border: `1px solid ${T.line}`,
    borderRadius: 6,
    padding: "5px 8px",
    marginLeft: 6,
  };

  const activeStatus = sectionTab === "reviews" ? reviewSourceStatus : sourceStatus;
  const statusColor =
    activeStatus === "loaded" ? T.teal :
    activeStatus === "error" ? T.red :
    T.amber;

  return (
    <div style={{
      minHeight: "100vh",
      background: T.bg,
      color: T.ink,
      padding: "28px 24px",
      transition: "background 0.25s, color 0.25s",
    }}>
      <style>{`
        button:focus-visible, select:focus-visible, input:focus-visible {
          outline: 2px solid ${T.amber};
          outline-offset: 2px;
        }
      `}</style>

      <div style={{ maxWidth: 1080, margin: "0 auto" }}>
        <div style={{
          display: "flex",
          alignItems: "baseline",
          justifyContent: "space-between",
          flexWrap: "wrap",
          gap: 12,
        }}>
          <div>
            <div style={{
              fontFamily: "'Barlow Condensed'",
              fontWeight: 700,
              fontSize: 30,
              letterSpacing: 0.5,
              textTransform: "uppercase",
            }}>
              Local Search &amp; <span style={{ color: T.amber }}>Reviews</span>
            </div>
            <div style={{ color: T.dim, fontSize: 13, marginTop: 2 }}>
              {sectionTab === "rankings"
                ? "Local pack & organic first-match position · Google Desktop · lower is better"
                : "Review generation, market performance, and listing-level trends"}
            </div>
          </div>

          <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
            <button
              onClick={() => setThemeName(themeName === "light" ? "dark" : "light")}
              style={{
                background: T.panelSoft,
                color: T.ink,
                border: `1px solid ${T.line}`,
                borderRadius: 999,
                padding: "8px 14px",
                fontSize: 14,
                cursor: "pointer",
              }}
            >
              {themeName === "light" ? "🌙 Dark" : "☀️ Light"}
            </button>

            <button
              onClick={() => {
                loadHostedData();
                loadReviewData();
              }}
              style={{
                background: T.panelSoft,
                color: T.ink,
                border: `1px solid ${T.line}`,
                borderRadius: 8,
                padding: "9px 14px",
                fontWeight: 600,
                fontSize: 14,
                cursor: "pointer",
              }}
            >
              Refresh data
            </button>

            {sectionTab === "rankings" && (
              <button
                onClick={() => fileRef.current?.click()}
                style={{
                  background: T.amber,
                  color: T.btnText,
                  border: "none",
                  borderRadius: 8,
                  padding: "9px 16px",
                  fontWeight: 600,
                  fontSize: 14,
                  cursor: "pointer",
                }}
              >
                Add weekly CSV
              </button>
            )}
          </div>

          <input
            ref={fileRef}
            type="file"
            accept=".csv"
            onChange={handleUpload}
            style={{ display: "none" }}
          />
        </div>

        <div
          role="tablist"
          aria-label="Dashboard sections"
          style={{
            display: "flex",
            gap: 4,
            marginTop: 22,
            borderBottom: `1px solid ${T.line}`,
          }}
        >
          {[
            { key: "rankings", label: "Search rankings" },
            { key: "reviews", label: "Reviews" },
          ].map((item) => (
            <button
              key={item.key}
              role="tab"
              aria-selected={sectionTab === item.key}
              onClick={() => setSectionTab(item.key)}
              style={{
                background: "transparent",
                color: sectionTab === item.key ? T.ink : T.dim,
                border: "none",
                borderBottom: `3px solid ${sectionTab === item.key ? T.amber : "transparent"}`,
                padding: "10px 16px 9px",
                fontWeight: 600,
                cursor: "pointer",
              }}
            >
              {item.label}
            </button>
          ))}
        </div>

        <div style={{
          ...card,
          marginTop: 12,
          padding: "10px 14px",
          display: "flex",
          justifyContent: "space-between",
          alignItems: "center",
          gap: 10,
          flexWrap: "wrap",
        }}>
          <div style={{ fontSize: 13, color: statusColor }}>
            {sectionTab === "reviews" ? reviewSourceMessage : sourceMessage}
          </div>
          {sectionTab === "reviews" ? (
            <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
              <a href={REVIEW_JOB_DATA_URL} target="_blank" rel="noreferrer" style={{ color: T.blue, fontSize: 12 }}>
                Job review data
              </a>
              <a href={STORE_REVIEW_DATA_URL} target="_blank" rel="noreferrer" style={{ color: T.blue, fontSize: 12 }}>
                Store review data
              </a>
            </div>
          ) : (
            <a
              href={RAW_DATA_URL}
              target="_blank"
              rel="noreferrer"
              style={{ color: T.blue, fontSize: 12, wordBreak: "break-all" }}
            >
              Open raw JSON
            </a>
          )}
        </div>

        <div style={{ display: sectionTab === "rankings" ? "block" : "none" }} aria-hidden={sectionTab !== "rankings"}>
        {note && (
          <div style={{ marginTop: 10, fontSize: 13, color: T.teal }}>
            {note}
          </div>
        )}

        {sourceStatus === "error" && rows.length === 0 && (
          <div style={{ ...card, marginTop: 14, color: T.dim, lineHeight: 1.6 }}>
            The dashboard is ready, but it currently has no rows. You can still use
            <strong style={{ color: T.ink }}> Add weekly CSV</strong>. For automatic loading,
            publish this HTML through GitHub Pages or another web server rather than opening
            it only as a local <code>file://</code> page.
          </div>
        )}

        <div style={{
          ...card,
          marginTop: 18,
          display: "flex",
          flexDirection: "column",
          gap: 12,
        }}>
          <div style={{
            display: "flex",
            gap: 8,
            alignItems: "center",
            flexWrap: "wrap",
          }}>
            <span style={{
              color: T.dim,
              fontSize: 12,
              textTransform: "uppercase",
              letterSpacing: 1,
              width: 64,
            }}>
              Keyword
            </span>

            {["all", ...keywords].map((item) => (
              <button
                key={item}
                onClick={() => setKeyword(item)}
                style={{
                  background: keyword === item ? T.ink : T.panelSoft,
                  color: keyword === item ? T.panel : T.dim,
                  border: `1px solid ${keyword === item ? T.ink : T.line}`,
                  borderRadius: 999,
                  padding: "6px 14px",
                  fontSize: 13,
                  fontWeight: 600,
                  cursor: "pointer",
                }}
              >
                {item === "all" ? "All keywords" : item}
              </button>
            ))}
          </div>

          <div style={{
            display: "flex",
            gap: 8,
            alignItems: "center",
            flexWrap: "wrap",
          }}>
            <span style={{
              color: T.dim,
              fontSize: 12,
              textTransform: "uppercase",
              letterSpacing: 1,
              width: 64,
            }}>
              Entity
            </span>

            <input
              value={entityQuery}
              onChange={(event) => setEntityQuery(event.target.value)}
              placeholder="Search city, address, or ID…"
              style={{
                background: T.panelSoft,
                color: T.ink,
                border: `1px solid ${T.line}`,
                borderRadius: 6,
                padding: "6px 10px",
                fontSize: 13,
                width: 220,
              }}
            />

            <select
              value={entity}
              onChange={(event) => setEntity(event.target.value)}
              style={{ ...selectStyle, marginLeft: 0, maxWidth: 450 }}
            >
              <option value="all">All entities ({entities.length})</option>
              {filteredEntities.map((item) => (
                <option key={item.id} value={item.id}>
                  {item.city} — {item.address} ({item.id})
                </option>
              ))}
            </select>

            {entity !== "all" && (
              <button
                onClick={() => setEntity("all")}
                style={{
                  background: "transparent",
                  color: T.dim,
                  border: `1px solid ${T.line}`,
                  borderRadius: 999,
                  padding: "5px 12px",
                  fontSize: 12,
                  cursor: "pointer",
                }}
              >
                Clear ✕
              </button>
            )}
          </div>

          {selectedEntity && (
            <div style={{ color: T.faint, fontSize: 12 }}>
              Showing {selectedEntity.id} · {selectedEntity.address}, {selectedEntity.city}.
              Single-entity weekly averages often come from only one or two rows per keyword,
              so week-to-week movement can be noisy.
            </div>
          )}
        </div>

        <div style={{
          display: "grid",
          gridTemplateColumns: "repeat(auto-fit, minmax(170px, 1fr))",
          gap: 12,
          marginTop: 14,
        }}>
          {kpi(
            "Pack · latest",
            latestPack?.avgRanked,
            `${latestPack?.week ?? "—"} · ${latestPack?.matchRate ?? "—"}% match · ${scopeLabel}`,
            T.amber
          )}
          {kpi(
            "Pack · Δ vs baseline",
            deltaText(packDelta),
            packDelta == null
              ? "needs 2+ full weeks"
              : packDelta < 0
              ? "moving up the pack"
              : packDelta > 0
              ? "slipping down"
              : "flat",
            deltaColor(packDelta)
          )}
          {kpi(
            "Organic · latest",
            latestOrganic?.avgRanked,
            `${latestOrganic?.week ?? "—"} · ${latestOrganic?.matchRate ?? "—"}% match · ${scopeLabel}`,
            T.blue
          )}
          {kpi(
            "Organic · Δ vs baseline",
            deltaText(organicDelta),
            organicDelta == null
              ? "needs 2+ full weeks"
              : organicDelta < 0
              ? "climbing organically"
              : organicDelta > 0
              ? "slipping down"
              : "flat",
            deltaColor(organicDelta)
          )}
        </div>

        <div style={{
          display: "flex",
          gap: 16,
          alignItems: "center",
          margin: "22px 0 4px",
          flexWrap: "wrap",
          fontSize: 13,
        }}>
          <div style={{
            display: "flex",
            background: T.panelSoft,
            border: `1px solid ${T.line}`,
            borderRadius: 8,
            overflow: "hidden",
          }}>
            {["pack", "organic"].map((item) => (
              <button
                key={item}
                onClick={() => setTab(item)}
                style={{
                  background: tab === item ? MM[item].color : "transparent",
                  color: tab === item ? T.onAccent : T.dim,
                  border: "none",
                  padding: "7px 16px",
                  fontWeight: 600,
                  fontSize: 13,
                  cursor: "pointer",
                }}
              >
                {MM[item].label}
              </button>
            ))}
          </div>

          <label style={{ color: T.dim }}>
            Metric
            <select
              value={mode}
              onChange={(event) => setMode(event.target.value)}
              style={selectStyle}
            >
              <option value="avgRanked">Avg position (ranked rows only)</option>
              <option value="avgAll">Avg position (zeros included)</option>
            </select>
          </label>

          <label style={{ color: T.dim }}>
            Rollout week marker
            <select
              value={rolloutWeek}
              onChange={(event) => setRolloutWeek(event.target.value)}
              style={selectStyle}
            >
              <option value="">none</option>
              {weeksList.map((week) => (
                <option key={week} value={week}>{week}</option>
              ))}
            </select>
          </label>
        </div>

        <TrendPanel
          rows={rows}
          metric={tab}
          mode={mode}
          keyword={keyword}
          keywords={keywords}
          entity={entity}
          rolloutWeek={rolloutWeek}
          card={card}
          T={T}
        />

        <KeywordTrends
          rows={rows}
          mode={mode}
          keywords={keywords}
          entity={entity}
          rolloutWeek={rolloutWeek}
          card={card}
          T={T}
        />

        <div style={{ ...card, marginTop: 12, overflowX: "auto" }}>
          <div style={{
            fontFamily: "'Barlow Condensed'",
            fontWeight: 600,
            fontSize: 17,
            textTransform: "uppercase",
            letterSpacing: 0.8,
            color: T.dim,
            marginBottom: 8,
          }}>
            Weekly summary — {scopeLabel}
          </div>

          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead>
              <tr style={{
                color: T.dim,
                textAlign: "left",
                textTransform: "uppercase",
                fontSize: 11,
                letterSpacing: 0.8,
              }}>
                {[
                  "Week", "Rows", "Pack pos", "Pack match",
                  "Organic pos", "Organic match", "Searches",
                ].map((heading) => (
                  <th
                    key={heading}
                    style={{
                      padding: "6px 10px",
                      borderBottom: `1px solid ${T.line}`,
                    }}
                  >
                    {heading}
                  </th>
                ))}
              </tr>
            </thead>

            <tbody>
              {packSummary.map((pack) => {
                const organic = organicSummary.find((item) => item.week === pack.week);
                return (
                  <tr key={pack.week}>
                    <td style={{ padding: "8px 10px", borderBottom: `1px solid ${T.line}` }}>
                      {pack.week}
                    </td>
                    <td style={{ padding: "8px 10px", borderBottom: `1px solid ${T.line}` }}>
                      {pack.n}
                    </td>
                    <td style={{
                      padding: "8px 10px",
                      borderBottom: `1px solid ${T.line}`,
                      color: T.amber,
                      fontWeight: 600,
                    }}>
                      {pack.avgRanked ?? "—"}
                    </td>
                    <td style={{ padding: "8px 10px", borderBottom: `1px solid ${T.line}` }}>
                      {pack.matchRate != null ? `${pack.matchRate}%` : "—"}
                    </td>
                    <td style={{
                      padding: "8px 10px",
                      borderBottom: `1px solid ${T.line}`,
                      color: T.blue,
                      fontWeight: 600,
                    }}>
                      {organic?.avgRanked ?? "—"}
                    </td>
                    <td style={{ padding: "8px 10px", borderBottom: `1px solid ${T.line}` }}>
                      {organic?.matchRate != null ? `${organic.matchRate}%` : "—"}
                    </td>
                    <td style={{ padding: "8px 10px", borderBottom: `1px solid ${T.line}` }}>
                      {pack.searches}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        <div style={{ ...card, marginTop: 12 }}>
          <div style={{
            display: "flex",
            justifyContent: "space-between",
            alignItems: "center",
            flexWrap: "wrap",
            gap: 8,
            marginBottom: 8,
          }}>
            <div style={{
              fontFamily: "'Barlow Condensed'",
              fontWeight: 600,
              fontSize: 17,
              textTransform: "uppercase",
              letterSpacing: 0.8,
              color: T.dim,
            }}>
              All entities — {keyword === "all" ? "all keywords" : keyword}
              {" "}({entitySummary.length})
            </div>

            <label style={{ color: T.dim, fontSize: 13 }}>
              Week
              <select
                value={sumWeek}
                onChange={(event) => setSumWeek(event.target.value)}
                style={selectStyle}
              >
                <option value="all">All weeks combined</option>
                {weeksList.map((week) => (
                  <option key={week} value={week}>{week}</option>
                ))}
              </select>
            </label>
          </div>

          <div style={{ maxHeight: 420, overflowY: "auto", overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
              <thead>
                <tr style={{
                  color: T.dim,
                  textAlign: "left",
                  textTransform: "uppercase",
                  fontSize: 11,
                  letterSpacing: 0.8,
                  position: "sticky",
                  top: 0,
                  background: T.panel,
                  zIndex: 1,
                }}>
                  <th
                    onClick={() => toggleSort("city")}
                    style={{
                      padding: "6px 10px",
                      borderBottom: `1px solid ${T.line}`,
                      cursor: "pointer",
                      userSelect: "none",
                    }}
                  >
                    Entity{arrow("city")}
                  </th>
                  <th
                    onClick={() => toggleSort("pack")}
                    style={{
                      padding: "6px 10px",
                      borderBottom: `1px solid ${T.line}`,
                      cursor: "pointer",
                      userSelect: "none",
                      color: T.amber,
                    }}
                  >
                    Pack pos{arrow("pack")}
                  </th>
                  <th
                    onClick={() => toggleSort("packRate")}
                    style={{
                      padding: "6px 10px",
                      borderBottom: `1px solid ${T.line}`,
                      cursor: "pointer",
                      userSelect: "none",
                    }}
                  >
                    Pack match{arrow("packRate")}
                  </th>
                  <th
                    onClick={() => toggleSort("organic")}
                    style={{
                      padding: "6px 10px",
                      borderBottom: `1px solid ${T.line}`,
                      cursor: "pointer",
                      userSelect: "none",
                      color: T.blue,
                    }}
                  >
                    Organic pos{arrow("organic")}
                  </th>
                  <th
                    onClick={() => toggleSort("orgRate")}
                    style={{
                      padding: "6px 10px",
                      borderBottom: `1px solid ${T.line}`,
                      cursor: "pointer",
                      userSelect: "none",
                    }}
                  >
                    Organic match{arrow("orgRate")}
                  </th>
                  <th
                    onClick={() => toggleSort("searches")}
                    style={{
                      padding: "6px 10px",
                      borderBottom: `1px solid ${T.line}`,
                      cursor: "pointer",
                      userSelect: "none",
                    }}
                  >
                    Searches{arrow("searches")}
                  </th>
                </tr>
              </thead>

              <tbody>
                {entitySummary.map((item) => (
                  <tr
                    key={item.id}
                    onClick={() => setEntity(entity === item.id ? "all" : item.id)}
                    style={{
                      cursor: "pointer",
                      background: entity === item.id ? T.panelSoft : "transparent",
                    }}
                    title="Click to filter the charts to this entity"
                  >
                    <td style={{ padding: "8px 10px", borderBottom: `1px solid ${T.line}` }}>
                      <span style={{ fontWeight: 600 }}>{item.city}</span>
                      <span style={{ color: T.faint }}>
                        {" "}— {item.address} · {item.id}
                      </span>
                    </td>
                    <td style={{
                      padding: "8px 10px",
                      borderBottom: `1px solid ${T.line}`,
                      color: T.amber,
                      fontWeight: 600,
                    }}>
                      {item.packPos ?? "—"}
                    </td>
                    <td style={{ padding: "8px 10px", borderBottom: `1px solid ${T.line}` }}>
                      {item.packRate != null ? `${item.packRate}%` : "—"}
                    </td>
                    <td style={{
                      padding: "8px 10px",
                      borderBottom: `1px solid ${T.line}`,
                      color: T.blue,
                      fontWeight: 600,
                    }}>
                      {item.orgPos ?? "—"}
                    </td>
                    <td style={{ padding: "8px 10px", borderBottom: `1px solid ${T.line}` }}>
                      {item.orgRate != null ? `${item.orgRate}%` : "—"}
                    </td>
                    <td style={{ padding: "8px 10px", borderBottom: `1px solid ${T.line}` }}>
                      {item.searches}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <div style={{ color: T.faint, fontSize: 12, marginTop: 8 }}>
            Click a column header to sort; entities with no ranking remain last.
            Click a row to filter the dashboard to that entity.
          </div>
        </div>

        <div style={{
          color: T.faint,
          fontSize: 12,
          marginTop: 14,
          lineHeight: 1.6,
        }}>
          The dashboard loads its base data from the hosted weekly JSON on each page load. Charts are rendered with built-in SVG and do not require Recharts.
          A position of 0 means no first match, so the default average uses ranked rows only
          and reports non-appearances separately through match rate. CSV uploads are temporary
          and remain in the current browser session only.
        </div>
        </div>

        <div style={{ display: sectionTab === "reviews" ? "block" : "none" }} aria-hidden={sectionTab !== "reviews"}>
          <ReviewDashboard
            jobRows={reviewJobRows}
            storeRows={storeReviewRows}
            sourceStatus={reviewSourceStatus}
            sourceMessage={reviewSourceMessage}
            card={card}
            T={T}
            selectStyle={selectStyle}
          />
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<RankTracker />);
</script>
</body>
</html>
